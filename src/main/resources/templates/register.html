<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Collaborate - Sign up</title>
<style>
body {
	margin: 0;
	padding: 0;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	background-color: #ffffff;
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
}

.register-container {
	text-align: center;
	width: 100%;
	max-width: 450px;
	padding: 20px;
	box-sizing: border-box;
}

.logo-box {
	position: relative;
	width: 120px;
	height: 120px;
	margin: 0 auto 10px auto;
}

.circle-main {
	width: 60px;
	height: 60px;
	border: 4px solid #0097a7;
	border-radius: 50%;
	position: absolute;
	top: 15px;
	left: 26px;
	background-color: #fff;
	z-index: 2;
}

.smile {
	width: 30px;
	height: 15px;
	border-bottom: 4px solid #0097a7;
	border-radius: 0 0 30px 30px;
	margin: 25px auto 0 auto;
}

.circle-left, .circle-right {
	width: 45px;
	height: 45px;
	border: 4px solid #0097a7;
	border-radius: 50%;
	position: absolute;
	top: 28px;
	background-color: #fff;
	z-index: 1;
}

.circle-left {
	left: 8px;
}

.circle-right {
	right: 8px;
}

.legs {
	width: 4px;
	height: 20px;
	background-color: #0097a7;
	position: absolute;
	bottom: 15px;
}

.leg-l {
	left: 38px;
	transform: rotate(15deg);
}

.leg-m {
	left: 58px;
	height: 15px;
}

.leg-r {
	right: 38px;
	transform: rotate(-15deg);
}

h2 {
	font-size: 28px;
	font-weight: 700;
	color: #2c3e50;
	margin: 0 0 20px 0;
}

form {
	text-align: left;
}

.form-group {
	margin-bottom: 15px;
}

label {
	display: block;
	font-size: 14px;
	color: #333;
	margin-bottom: 5px;
	font-weight: 500;
}

input {
	width: 100%;
	padding: 10px;
	font-size: 16px;
	border: 1px solid #ccc;
	border-radius: 4px;
	box-sizing: border-box;
	outline: none;
	transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
	border-color: #66b3ff;
	box-shadow: 0 0 5px rgba(102, 179, 255, 0.5);
}

.hint {
	font-size: 11px;
	color: #666;
	margin-top: 4px;
}

.btn-box {
	text-align: center;
	margin-top: 25px;
}

.btn {
	display: inline-block;
	padding: 10px 30px;
	font-size: 16px;
	font-weight: bold;
	color: white;
	background-color: #008ba3;
	border: none;
	border-radius: 4px;
	text-decoration: none;
	cursor: pointer;
	transition: background-color 0.2s;
}

.btn:hover {
	background-color: #006877;
}

.footer-link {
	margin-top: 15px;
	font-size: 14px;
	color: #555;
}

.footer-link a {
	color: #555;
	text-decoration: underline;
}
</style>
</head>
<body>

	<div class="register-container">
		<div class="logo-box">
			<div class="circle-left"></div>
			<div class="circle-main">
				<div class="smile"></div>
			</div>
			<div class="circle-right"></div>
			<div class="legs leg-l"></div>
			<div class="legs leg-m"></div>
			<div class="legs leg-r"></div>
		</div>

		<h2>Sign up</h2>

		<form th:action="@{/register}" th:object="${user}" method="post">
			<div class="form-group">
				<label for="username">Name</label> <input type="text" id="username"
					th:field="*{username}" required />
			</div>

			<div class="form-group">
				<label for="email">Email</label> <input type="email" id="email"
					th:field="*{email}" required />
			</div>

			<div class="form-group">
				<label for="password">Password</label> <input type="password"
					id="password" th:field="*{password}" minlength="6" required />
				<div class="hint">Must be at least 6 characters long</div>
			</div>

			<div class="form-group">
				<label for="passwordConfirmation">Password confirmation</label> <input
					type="password" id="passwordConfirmation"
					name="passwordConfirmation" required />
			</div>

			<div class="btn-box">
				<button type="submit" class="btn">Sign up</button>
			</div>
		</form>

		<div class="footer-link">
			Already a member? <a href="/login">Log in</a>
		</div>
	</div>

</body>
</html>
