<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Collaborate - Projects</title>
<link rel="stylesheet" th:href="@{/css/projects.css}">
<script>
	document.addEventListener("DOMContentLoaded", function() {
		var form = document.getElementById("newProjectFormContainer");
		var grid = document.querySelector(".projects-grid");

		var formStatus = localStorage.getItem("projectFormStatus");

		if (formStatus === "open") {
			if (form)
				form.style.display = "block";
			if (grid)
				grid.style.display = "none";
		} else {
			if (form)
				form.style.display = "none";
			if (grid)
				grid.style.display = "flex";
		}
	});

	function toggleProjectForm() {
		var form = document.getElementById("newProjectFormContainer");
		var grid = document.querySelector(".projects-grid");

		if (form.style.display === "none" || form.style.display === "") {
			form.style.display = "block";
			if (grid)
				grid.style.display = "none";

			localStorage.setItem("projectFormStatus", "open");
		} else {
			form.style.display = "none";
			if (grid)
				grid.style.display = "flex";

			localStorage.setItem("projectFormStatus", "closed");
		}
	}
</script>
</head>
<body>

	<div class="navbar">
		<div class="logo-small"
			onclick="localStorage.setItem('projectFormStatus', 'closed'); window.location.href='/projects?filter=all';">
			<div class="c-left"></div>
			<div class="c-main">
				<div class="sml"></div>
			</div>
			<div class="c-right"></div>
		</div>
		<div class="nav-links">
			<button type="button" class="nav-item" onclick="toggleProjectForm()">+
				Add Project</button>
			<a href="/profile/edit" class="nav-item"
				onclick="localStorage.setItem('projectFormStatus', 'closed');">👤
				Edit Profile</a>

			<form th:action="@{/logout}" method="post" id="logoutForm"
				class="logout-form" style="display: none;">
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
			</form>
			<button type="submit" form="logoutForm" class="nav-item"
				onclick="localStorage.clear();">🔓 Log Out</button>
		</div>
	</div>

	<div class="main-container">
		<h1>Projects</h1>

		<div class="project-tabs">
			<a th:href="@{/projects(filter='all')}" class="tab-box"
				th:classappend="${currentFilter == 'all' || currentFilter == null} ? 'active-tab' : ''"
				onclick="localStorage.setItem('projectFormStatus', 'closed');">
				<span>✳</span> All projects
			</a> <a th:href="@{/projects(filter='created')}" class="tab-box"
				th:classappend="${currentFilter == 'created'} ? 'active-tab' : ''"
				onclick="localStorage.setItem('projectFormStatus', 'closed');">
				<span>📝</span> Created by me
			</a> <a th:href="@{/projects(filter='shared')}" class="tab-box"
				th:classappend="${currentFilter == 'shared'} ? 'active-tab' : ''"
				onclick="localStorage.setItem('projectFormStatus', 'closed');">
				<span>👥</span> Shared with me
			</a>
		</div>

		<div id="newProjectFormContainer" class="form-container">
			<h3 style="margin-top: 0; color: #2c3e50;">Create New Project</h3>
			<form th:action="@{/projects/new}" th:object="${newProjectObj}"
				method="post"
				onsubmit="localStorage.setItem('projectFormStatus', 'closed');">
				<div class="form-group">
					<label for="name">Name</label> <input type="text" id="name"
						th:field="*{name}" required />
				</div>
				<div class="form-group">
					<label for="description">Description</label>
					<textarea id="description" th:field="*{description}"></textarea>
				</div>
				<button type="submit" class="btn-submit">Create Project</button>
			</form>
		</div>

		<div class="projects-grid">
			<div
				th:if="${#lists.isEmpty(projects) && (currentFilter == 'all' || currentFilter == 'created' || currentFilter == null)}"
				style="color: #a0aec0; width: 100%; text-align: center;">No
				projects have been created yet. Add one by clicking "+ Add Project"
				from the top menu.</div>

			<div th:if="${#lists.isEmpty(projects) && currentFilter == 'shared'}"
				style="color: #a0aec0; width: 100%; text-align: center;">No
				projects are being shared with you yet.</div>

			<div th:each="project : ${projects}" class="project-card">
				<div class="card-header">
					<h3 style="cursor: pointer;"
						th:onclick="'window.location.href=\'/projects/view/' + ${project.id} + '\''"
						th:text="${project.name}">New Project!!</h3>

					<div class="owner">
						<span>🖋</span> <span th:text="${project.owner.email}">toto@gmail.com</span>
					</div>

					<a th:href="@{/projects/view/{id}(id=${project.id})}"
						class="btn-edit">⚙️</a>
				</div>

				<div class="card-body" th:text="${project.description}">Description.</div>

				<div class="card-footer">
					<div class="card-stats">
						<div class="stat-item">
							👥 <span th:text="${project.getTotalMemberCount()}">1</span>
						</div>
						<div class="stat-item">
							💬 <span th:text="${project.getDiscussionCount()}">0</span>
						</div>
					</div>
					<form th:action="@{/projects/delete/{id}(id=${project.id})}"
						method="post"
						onsubmit="return confirm('Do you want to delete this project?');">
						<button type="submit" class="btn-delete">🗑️</button>
					</form>
				</div>
			</div>
		</div>
	</div>

</body>
</html>
