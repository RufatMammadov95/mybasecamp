<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Collaborate - Edit Profile</title>
<link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

	<div class="register-container">
		<h2>Edit Profile</h2>

		<div th:if="${successMessage}" class="error-message"
			style="background-color: #d4edda; color: #155724; border-color: #c3e6cb;">
			✅ <span th:text="${successMessage}">Updated successfully</span>
		</div>

		<div th:if="${errorMessage}" class="error-message">
			❌ <span th:text="${errorMessage}">An error occurred</span>
		</div>

		<form th:action="@{/profile/update}" method="post">

			<div class="form-group">
				<label for="username">Name (Username)</label> <input type="text"
					id="username" name="username" th:value="${user.username}" required />
			</div>

			<div class="form-group">
				<label>Email (Cannot be changed)</label> <input type="email"
					th:value="${user.email}" disabled
					style="background-color: #e9ecef; cursor: not-allowed;" />
			</div>

			<h3
				style="margin-top: 25px; color: #34495e; font-size: 16px; border-top: 1px solid #eee; padding-top: 15px;">
				Change Password (Optional)</h3>

			<div class="form-group">
				<label for="oldPassword">Current Password</label> <input
					type="password" id="oldPassword" name="oldPassword"
					placeholder="Enter your current password" />
			</div>

			<div class="form-group">
				<label for="newPassword">New Password</label> <input type="password"
					id="newPassword" name="newPassword" minlength="6"
					placeholder="Enter new password (min. 6 simvol)" />
			</div>

			<div class="btn-box"
				style="display: flex; gap: 10px; justify-content: center;">
				<button type="submit" class="btn">Save</button>
				<a href="/projects" class="btn"
					onclick="localStorage.setItem('projectFormStatus', 'closed');"
					style="background-color: #7f8c8d; text-decoration: none; line-height: 20px; text-align: center;">
					Go back </a>
			</div>
		</form>
	</div>

</body>
</html>
