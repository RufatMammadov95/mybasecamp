version: "3.8"

services:
    db:
        image: postgres:15-alpine
        container_name: basecamp-postgres-db
        environment:
            POSTGRES_DB: mybasecamp_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: your_secure_password
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - basecamp-network

    app:
        build: .
        container_name: basecamp-spring-app
        ports:
            - "8080:8080"
        environment:
            - DB_HOST=db
            - DB_PORT=5432
            - DB_NAME=mybasecamp_db
            - DB_USERNAME=postgres
            - DB_PASSWORD=your_secure_password
        depends_on:
            - db
        networks:
            - basecamp-network

volumes:
    postgres_data:

networks:
    basecamp-network:
        driver: bridge
